name: Continuous Integration
on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.5

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y check

      - name: Change to test repo
        run: cd tests

      - name: Build the tests
        run: make
